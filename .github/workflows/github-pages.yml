# 公開: リポジトリ Settings → Pages → Build and deployment の Source で
# 「GitHub Actions」を選ぶ（初回のみ）。以降は main への push で自動デプロイ。
# URL 例: https://<ユーザー名>.github.io/<リポジトリ名>/
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (ブラウザ用ファイルのみ)
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp -r js _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
